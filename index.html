<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gallery - 数字画廊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================
           现代化色彩系统 - 精致未来主义调色板
           ============================================ */
        :root {
            /* 主色调：深邃紫罗兰到青色渐变 */
            --gradient-start: #6366f1;
            --gradient-mid: #8b5cf6;
            --gradient-end: #06b6d4;
            
            /* 背景层次 */
            --bg-deep: #030712;
            --bg-base: #0a0a0f;
            --bg-elevated: #111118;
            --bg-card: #16161d;
            --bg-card-hover: #1c1c26;
            
            /* 文字层级 */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-accent: #c4b5fd;
            
            /* 边框与分隔 */
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-light: rgba(255, 255, 255, 0.1);
            --border-glow: rgba(139, 92, 246, 0.3);
            
            /* 特效颜色 */
            --glow-primary: rgba(139, 92, 246, 0.4);
            --glow-secondary: rgba(6, 182, 212, 0.3);
            --glow-accent: rgba(168, 85, 247, 0.2);
            
            /* 阴影系统 */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px var(--glow-primary);
            
            /* 圆角系统 */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        /* ============================================
           基础样式与排版系统
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 精致衬线字体用于标题 */
        h1, h2, h3, h4 {
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* ============================================
           高级滚动条样式
           ============================================ */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-base);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--gradient-mid), var(--gradient-end));
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--gradient-start), var(--gradient-mid));
        }

        /* ============================================
           动态背景系统 - 粒子与光效
           ============================================ */
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--glow-primary) 0%, transparent 70%);
            top: -200px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--glow-secondary) 0%, transparent 70%);
            bottom: -150px;
            right: -100px;
            animation-delay: -7s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--glow-accent) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 10px) scale(1.02); }
        }

        /* 网格纹理背景 */
        .grid-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.5;
        }

        /* ============================================
           毛玻璃与发光效果
           ============================================ */
        .glass {
            background: rgba(22, 22, 29, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
        }

        .glass-strong {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-subtle);
        }

        .glow-border {
            position: relative;
        }

        .glow-border::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .glow-border:hover::before {
            opacity: 1;
        }

        /* ============================================
           现代化导航栏设计
           ============================================ */
        .nav-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 0 2rem;
        }

        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .nav-logo:hover {
            transform: scale(1.02);
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-glow);
            animation: logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 20px var(--glow-primary); }
            50% { box-shadow: 0 0 40px var(--glow-secondary); }
        }

        .logo-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--text-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 搜索框设计 */
        .search-container {
            flex: 1;
            max-width: 480px;
            margin: 0 3rem;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 12px 20px 12px 48px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--gradient-mid);
            box-shadow: 0 0 0 3px var(--glow-primary), var(--shadow-md);
            background: var(--bg-card-hover);
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .search-box:focus + .search-icon {
            color: var(--gradient-mid);
        }

        /* 导航链接 */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link {
            padding: 10px 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: var(--radius-md);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: inherit;
        }

        .nav-link:hover {
            color: var(--text-primary);
        }

        .nav-link:hover::before {
            opacity: 0.1;
        }

        .nav-link.active {
            color: var(--text-primary);
        }

        .nav-link.active::before {
            opacity: 0.15;
        }

        /* ============================================
           英雄区域 - 沉浸式开场
           ============================================ */
        .hero-section {
            position: relative;
            padding: 160px 2rem 80px;
            text-align: center;
            overflow: hidden;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 50px;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease;
        }

        .hero-badge-dot {
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .hero-title-gradient {
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-accent) 50%, var(--gradient-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 200% 200%;
            animation: gradientShift 5s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .hero-description {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 640px;
            margin: 0 auto 3rem;
            line-height: 1.8;
            animation: fadeInUp 0.8s ease 0.4s both;
        }

        .hero-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            animation: fadeInUp 0.8s ease 0.6s both;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px var(--glow-primary);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1rem;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: var(--gradient-mid);
        }

        /* ============================================
           作品网格 - 瀑布流现代布局
           ============================================ */
        .gallery-section {
            position: relative;
            z-index: 10;
            padding: 2rem 2rem 6rem;
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 3rem;
            padding: 0 1rem;
        }

        .gallery-title {
            font-size: 1.75rem;
            color: var(--text-primary);
        }

        .gallery-stats {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* 作品卡片 - 现代化设计 */
        .artwork-card {
            position: relative;
            border-radius: var(--radius-xl);
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            animation: cardReveal 0.6s ease forwards;
        }

        .artwork-card:nth-child(1) { animation-delay: 0.1s; }
        .artwork-card:nth-child(2) { animation-delay: 0.2s; }
        .artwork-card:nth-child(3) { animation-delay: 0.3s; }
        .artwork-card:nth-child(4) { animation-delay: 0.4s; }
        .artwork-card:nth-child(5) { animation-delay: 0.5s; }
        .artwork-card:nth-child(6) { animation-delay: 0.6s; }
        .artwork-card:nth-child(7) { animation-delay: 0.7s; }
        .artwork-card:nth-child(8) { animation-delay: 0.8s; }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .artwork-card:hover {
            transform: translateY(-8px);
            border-color: var(--border-glow);
            box-shadow: var(--shadow-lg), 0 0 60px var(--glow-primary);
        }

        .artwork-image-wrapper {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
        }

        .artwork-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .artwork-card:hover .artwork-image {
            transform: scale(1.08);
        }

        /* 图片上的渐变遮罩 */
        .artwork-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                transparent 0%,
                transparent 40%,
                rgba(3, 7, 18, 0.6) 70%,
                rgba(3, 7, 18, 0.95) 100%
            );
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .artwork-card:hover .artwork-overlay {
            opacity: 1;
        }

        /* 卡片上的信息 */
        .artwork-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s ease;
        }

        .artwork-card:hover .artwork-info {
            transform: translateY(0);
            opacity: 1;
        }

        .artwork-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .artwork-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .artwork-model {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            color: var(--text-accent);
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* 卡片底部信息 */
        .artwork-footer {
            padding: 1.25rem;
            border-top: 1px solid var(--border-subtle);
        }

        .artwork-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .artwork-tag {
            padding: 4px 12px;
            background: var(--bg-elevated);
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .artwork-card:hover .artwork-tag {
            background: var(--bg-card-hover);
            color: var(--text-secondary);
        }

        /* ============================================
           详情页 - 沉浸式画廊体验
           ============================================ */
        .detail-container {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: var(--bg-deep);
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .detail-container.active {
            opacity: 1;
            visibility: visible;
        }

        .detail-nav {
            position: sticky;
            top: 0;
            z-index: 210;
            padding: 1rem 2rem;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
        }

        .detail-nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--gradient-mid);
        }

        .detail-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            max-width: 500px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .detail-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--gradient-mid);
        }

        /* 详情内容 */
        .detail-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 3rem;
        }

        @media (max-width: 1024px) {
            .detail-content {
                grid-template-columns: 1fr;
            }
        }

        /* 图片展示区 */
        .detail-image-section {
            position: relative;
        }

        .detail-image-wrapper {
            position: relative;
            border-radius: var(--radius-xl);
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-lg);
        }

        .detail-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .image-zoom-hint {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .detail-image-wrapper:hover .image-zoom-hint {
            opacity: 1;
            transform: translateY(0);
        }

        /* 作品描述 */
        .detail-description {
            margin-top: 2rem;
            padding: 1.5rem;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
        }

        .detail-description h3 {
            font-size: 1.125rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-description p {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        /* 参数面板 */
        .parameter-panel {
            position: sticky;
            top: 100px;
        }

        .parameter-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }

        .parameter-section {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .parameter-section:last-child {
            border-bottom: none;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: var(--radius-sm);
            color: white;
            font-size: 0.875rem;
        }

        /* 参数网格 */
        .param-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .param-item {
            padding: 1rem;
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-subtle);
            transition: all 0.3s ease;
        }

        .param-item:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
        }

        .param-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .param-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 提示词区域 */
        .prompt-box {
            background: var(--bg-elevated);
            border-radius: var(--radius-md);
            padding: 1rem;
            max-height: 150px;
            overflow-y: auto;
            position: relative;
        }

        .prompt-text {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.7;
            word-break: break-word;
        }

        .prompt-label {
            position: absolute;
            top: -10px;
            left: 12px;
            padding: 2px 8px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        /* 标签展示 */
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-item {
            padding: 6px 14px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 50px;
            font-size: 0.875rem;
            color: var(--text-accent);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .tag-item:hover {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
            transform: translateY(-2px);
        }

        /* ============================================
           页脚 - 现代简约设计
           ============================================ */
        .footer {
            position: relative;
            z-index: 10;
            padding: 4rem 2rem;
            background: linear-gradient(180deg, transparent, rgba(3, 7, 18, 0.8));
            border-top: 1px solid var(--border-subtle);
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .footer-links {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .footer-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.3s ease;
        }

        .footer-link:hover {
            color: var(--text-primary);
        }

        .footer-divider {
            width: 1px;
            height: 16px;
            background: var(--border-light);
        }

        .footer-copyright {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        /* ============================================
           动画系统
           ============================================ */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 加载动画 */
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           响应式设计
           ============================================ */
        @media (max-width: 768px) {
            .nav-container {
                padding: 0 1rem;
            }

            .nav-inner {
                height: 64px;
            }

            .search-container {
                display: none;
            }

            .nav-links {
                display: none;
            }

            .hero-section {
                padding: 120px 1rem 60px;
            }

            .hero-title {
                font-size: 2.5rem;
            }

            .hero-description {
                font-size: 1rem;
            }

            .gallery-section {
                padding: 1rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1rem;
            }

            .detail-content {
                padding: 1.5rem 1rem;
            }

            .parameter-panel {
                position: static;
            }

            .param-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ============================================
           辅助类
           ============================================ */
        .hidden {
            display: none !important;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
</head>

        // 渲染作品网格
        function renderArtworkGrid() {
            const grid = document.getElementById('artwork-grid');
            grid.innerHTML = artworks.map((artwork, index) => `
                <article class="artwork-card" onclick="showDetail('${artwork.id}')" role="button" tabindex="0">
                    <div class="artwork-image-wrapper">
                        <img src="${artwork.thumbnailUrl}" alt="${artwork.title}" class="artwork-image" loading="lazy">
                        <div class="artwork-overlay"></div>
                        <div class="artwork-info">
                            <h3 class="artwork-title">${artwork.title}</h3>
                            <div class="artwork-meta">
                                <span class="artwork-model">
                                    <i class="fas fa-microchip"></i>
                                    ${artwork.parameters.model}
                                </span>
                                <span>
                                    <i class="fas fa-ruler-combined mr-1"></i>
                                    ${artwork.parameters.width}×${artwork.parameters.height}
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="artwork-footer">
                        <div class="artwork-tags">
                            ${artwork.tags.slice(0, 3).map(tag => `<span class="artwork-tag">#${tag}</span>`).join('')}
                            ${artwork.tags.length > 3 ? `<span class="artwork-tag">+${artwork.tags.length - 3}</span>` : ''}
                        </div>
                    </div>
                </article>
            `).join('');

            // 更新作品数量
            document.getElementById('artwork-count').textContent = `${artworks.length} 件作品`;
        }

        // 显示详情页
        function showDetail(id) {
            const artwork = artworks.find(a => a.id === id);
            if (!artwork) return;

            // 隐藏主内容，显示详情
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('detail-content').classList.add('active');

            // 设置标题
            document.getElementById('detail-title').textContent = artwork.title;

            // 设置图片
            document.getElementById('detail-image').src = artwork.imageUrl;
            document.getElementById('detail-image').alt = artwork.title;

            // 设置描述
            const descSection = document.getElementById('detail-description');
            if (artwork.description) {
                descSection.classList.remove('hidden');
                descSection.querySelector('p').textContent = artwork.description;
            } else {
                descSection.classList.add('hidden');
            }

            // 渲染参数
            const paramItems = [
                { label: '模型', value: artwork.parameters.model, icon: 'microchip' },
                { label: '采样器', value: artwork.parameters.sampler || '-', icon: 'wave-square' },
                { label: '步数', value: artwork.parameters.steps.toString(), icon: 'steps' },
                { label: 'CFG Scale', value: artwork.parameters.cfgScale.toString(), icon: 'sliders-h' },
                { label: '种子', value: artwork.parameters.seed.toString(), icon: 'seedling' },
                { label: '尺寸', value: `${artwork.parameters.width} × ${artwork.parameters.height}`, icon: 'expand' },
            ];

            document.getElementById('parameter-grid').innerHTML = paramItems.map(item => `
                <div class="param-item">
                    <div class="param-label">${item.label}</div>
                    <div class="param-value">${item.value}</div>
                </div>
            `).join('');

            // 设置提示词
            document.getElementById('positive-prompt').textContent = artwork.parameters.positivePrompt;
            
            const negSection = document.getElementById('negative-prompt-section');
            if (artwork.parameters.negativePrompt) {
                negSection.classList.remove('hidden');
                document.getElementById('negative-prompt').textContent = artwork.parameters.negativePrompt;
            } else {
                negSection.classList.add('hidden');
            }

            // 渲染标签
            document.getElementById('tags-container').innerHTML = artwork.tags.map(tag => `
                <span class="tag-item">#${tag}</span>
            `).join('');

            // 滚动到顶部
            document.getElementById('detail-content').scrollTop = 0;
            window.scrollTo(0, 0);

            // 阻止背景滚动
            document.body.style.overflow = 'hidden';
        }

        // 返回首页
        function showHome() {
            document.getElementById('detail-content').classList.remove('active');
            document.getElementById('main-content').classList.remove('hidden');
            
            // 恢复滚动
            document.body.style.overflow = '';
            
            // 滚动到画廊
            setTimeout(() => {
                document.getElementById('gallery').scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }

        // 复制文本
        function copyText(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                // 显示复制成功反馈
                const button = event.target.closest('button');
                const icon = button.querySelector('i');
                icon.className = 'fas fa-check';
                button.style.color = '#10b981';
                
                setTimeout(() => {
                    icon.className = 'fas fa-copy';
                    button.style.color = '';
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
            });
        }

        // 滚动到画廊
        function scrollToGallery() {
            document.getElementById('gallery').scrollIntoView({ behavior: 'smooth' });
        }

        // 键盘导航支持
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('detail-content').classList.contains('active')) {
                showHome();
            }
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderArtworkGrid();
        });
    </script>
</body>
</html>
